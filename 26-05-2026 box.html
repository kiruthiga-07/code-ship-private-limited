<!DOCTYPE html>
<html>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background-color: beige;
        }


        .box{
            height: 150px;
            width: 150px;
            border: 2px solid black;
            border-radius: 8px; 
            justify-content: center; 
            align-items: center;    
            display: flex;
            background-color: rgb(202, 247, 232);
            font-size: 30px;
            font-weight: bold;
        } 

        .rows{
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin: 0;
        }

        .center{
            display: flex;
            justify-content: center;
            gap: 100px;
        }

        .container{
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
    </style>
    <body>
        <div class="container">
            <div class="rows">
                <div class="box">1</div>
                <div class="box">2</div>
            </div>

            <div class="center">
                <div class="box">3</div>
                <div class="box">6</div>
                <div class="box">7</div>
            </div>

            <div class="rows">
                <div class="box">4</div>
                <div class="box">5</div>
            </div>
        </div>
    </body>
</html>
